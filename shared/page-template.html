<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{PAGE_TITLE}} — Syhrezz Design System</title>
<meta name="description" content="{{PAGE_DESC}}"/>
<link rel="stylesheet" href="{{PATH_PREFIX}}shared/ds-shell.css"/>
</head>
<body>
<div class="ds-shell">

  <!-- LEFT SIDEBAR -->
  <aside class="ds-sidebar">
    <div class="ds-sidebar-header">
      <div class="ds-sidebar-logo">
        <div class="ds-sidebar-logo-icon">N</div>
        <div class="ds-sidebar-logo-text">
          <div class="ds-sidebar-logo-name">Syhrezz</div>
          <div class="ds-sidebar-logo-version">v1.0</div>
        </div>
      </div>
      <div class="ds-search-wrap">
        <div class="ds-search-box">
          <svg style="width:13px;height:13px" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input id="ds-search-input" type="text" placeholder="Search..." autocomplete="off"/>
          <span class="ds-search-kbd">⌘K</span>
        </div>
        <div id="ds-search-results"></div>
      </div>
    </div>
    <nav class="ds-sidebar-nav" id="ds-nav-links"></nav>
  </aside>

  <!-- TOPBAR -->
  <header class="ds-topbar">
    <nav class="ds-topbar-breadcrumb">
      {{BREADCRUMB}}
    </nav>
    <div class="ds-topbar-right">
      <span class="ds-topbar-tag">{{PAGE_SECTION}}</span>
      <a href="{{PATH_PREFIX}}index.html"
         style="font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px">
        <svg style="width:12px;height:12px" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
        </svg>
        Preview
      </a>
    </div>
  </header>

  <!-- MAIN -->
  <div class="ds-main">
    <article class="ds-page" id="ds-page-content">
      {{PAGE_CONTENT}}
      <div id="ds-prev-next"></div>
    </article>
    <aside class="ds-toc" id="ds-toc"></aside>
  </div>

</div>
<script>window.DS_ACTIVE_PAGE = '{{ACTIVE_PAGE_ID}}';</script>
<script src="{{PATH_PREFIX}}shared/ds-shell.js"></script>
</body>
</html>
